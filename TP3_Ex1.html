<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inscrit_Event</title>
</head>
<body>
<h1>Formulaire d'inscription à un événement scientifique</h1>


<form method="post" action="">

    <fieldset>
        <legend>Informations personnelles</legend>

        <label for="nom">Nom et Prénom :</label>
        <input type="text" id="nom" name="nom" required>
        <br><br>

        <label for="email">Adresse e-mail :</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="password">Mot de passe :</label>
        <input type="password" id="password" name="password" required>
        <br><br>
        Civilité :
        <input type="radio" id="m" name="civilite" value="M">
        <label for="m">M.</label>

        <input type="radio" id="mme" name="civilite" value="Mme">
        <label for="mme">Mme</label>

    </fieldset>

    <br>

    <fieldset>
        <legend>Informations académiques</legend>

        <label for="filiere">Filière :</label>
        <select id="filiere" name="filiere">
            <option value="GI">GI</option>
            <option value="GP">GP</option>
            <option value="GESE">GESE</option>
            <option value="MSD">MSD</option>
        </select>

        <br><br>

        <label for="niveau">Semestre :</label>
        <select id="niveau" name="niveau">
            <option>S1</option>
            <option>S2</option>
            <option>S3</option>
            <option>S4</option>
            <option>S5</option>
            <option>S6</option>
        </select>

        <br><br>

        Thèmes qui vous intéressent :
        <br>
        <input type="checkbox" name="theme" value="web"> Web
        <input type="checkbox" name="theme" value="reseaux"> Réseaux
        <input type="checkbox" name="theme" value="ia"> IA

        <br><br>

        <label for="date">Date de participation :</label>
        <input type="date" id="date" name="date">

        <br><br>

        <label for="message">Commentaires :</label><br>
        <textarea id="message" name="message" rows="4" cols="40"></textarea>

    </fieldset>

    <br>

    <input type="submit" value="S'inscrire">
    <input type="reset" value="Effacer">

</form>


</body>
</html>
